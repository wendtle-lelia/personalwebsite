services:
  web:
    build: .
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: Caddyfile.Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
